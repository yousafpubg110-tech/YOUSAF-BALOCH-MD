services:
  - type: worker
    name: yousaf-baloch-md
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    autoDeploy: true
    envVars:
      - key: SESSION_ID
        sync: false
      - key: PREFIX
        value: "."
      - key: MODE
        value: public
      - key: NODE_ENV
        value: production
      - key: TIMEZONE
        value: Asia/Karachi
        
