name: yousaf-baloch-md
services:
  - name: yousaf-baloch-md
    type: web
    git:
      branch: main
    docker:
      dockerfile: Dockerfile
    ports:
      - port: 3000
        protocol: http
    env:
      - key: NODE_ENV
        value: production
      - key: SESSION_ID
        secret: SESSION_ID
      - key: PREFIX
        value: "."
      - key: MODE
        value: "public"
    healthChecks:
      - path: /
        port: 3000
    scaling:
      min: 1
      max: 1
    regions:
      - was
